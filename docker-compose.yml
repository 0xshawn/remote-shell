# Monorepo deployment: builds the Go server + bakes in the web/ frontend, then
# fronts it with an nginx TLS proxy. For a first deploy just run, from the repo root:
#
#   ./install.sh           # builds, wires the host SSH key + TLS, prints the password
#
# That auto-creates .env, generates+persists secrets, and authorizes the host SSH
# key. `docker compose up -d` also works once .env / certs / the SSH key are set up.
# The web terminal logs into the HOST (via SSH), not the container — see SSH_*.

services:
  remote-shell:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: remote-shell:latest
    container_name: remote-shell
    restart: unless-stopped
    environment:
      AUTH_USER: ${AUTH_USER:-admin}
      # Blank -> the server generates a password on first boot, persists it to the
      # shell-home volume (stable across restarts), and prints it to the logs.
      AUTH_PASS: ${AUTH_PASS:-}
      # Blank -> the server generates a TOKEN_SECRET once and persists it to the
      # shell-home volume, so login tokens survive restarts. No openssl needed.
      TOKEN_SECRET: ${TOKEN_SECRET:-}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-20160}   # minutes a detached+idle session survives (default 20160 = 14 days; 0 = forever)
      RING_BYTES: ${RING_BYTES:-2097152}       # per-session scrollback buffer (bytes)
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # --- Log into the HOST instead of the container's own shell. ---
      # The container SSHes to the host via host.docker.internal (see extra_hosts).
      # SSH_KEY points at a key generated inside the container (persisted in the
      # shell-home volume); its public key must be in the host user's authorized_keys.
      # Leave SSH_HOST empty to fall back to a local container shell.
      SSH_HOST: ${SSH_HOST-host.docker.internal}
      SSH_USER: ${SSH_USER-youruser}
      SSH_PORT: ${SSH_PORT:-22}
      SSH_KEY: ${SSH_KEY-/home/shell/.ssh/id_hostshell}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Published only to localhost; the nginx service reaches it over the internal
    # network. To expose the app directly without TLS, use "7681:7681" instead.
    ports:
      - "127.0.0.1:7681:7681"
    volumes:
      # Persist the home directory (and the SSH key) across container recreation.
      - shell-home:/home/shell

  # TLS reverse proxy. On first boot it generates a self-signed cert if none is
  # present (see 40-selfsigned.sh); drop real fullchain.pem/privkey.pem into
  # ./server/nginx/certs to replace it.
  nginx:
    image: nginx:alpine
    container_name: remote-shell-nginx
    restart: unless-stopped
    depends_on:
      - remote-shell
    environment:
      # Your domain, injected into the nginx template at startup (set in .env).
      # Defaults to "_" (catch-all) so it still works without a domain.
      SERVER_NAME: ${SERVER_NAME:-_}
    # Host ports moved off 80/443 to avoid clashing with an existing reverse
    # proxy. Access the UI at https://<host>:8443
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./server/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      # Init hook: generates a self-signed cert on first boot if none is present.
      - ./server/nginx/40-selfsigned.sh:/docker-entrypoint.d/40-selfsigned.sh:ro
      # Writable so the self-signed cert can be created here on first boot.
      - ./server/nginx/certs:/etc/nginx/certs

volumes:
  shell-home:
