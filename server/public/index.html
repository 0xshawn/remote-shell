<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1e1e1e" />
  <title>Remote Shell</title>
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="toolbar">
    <span id="status" class="status status-off">offline</span>
    <span id="session-label" class="spacer"></span>
    <div class="btns">
      <button id="btn-font-dec" title="Smaller font">A-</button>
      <button id="btn-font-inc" title="Larger font">A+</button>
      <button id="btn-theme" title="Toggle theme">&#127773;</button>
      <button id="btn-copy" title="Copy selection">Copy</button>
      <button id="btn-paste" title="Paste from clipboard">Paste</button>
      <button id="btn-clear" title="Clear screen">Clear</button>
      <button id="btn-reconnect" title="Reconnect">Reconnect</button>
      <button id="btn-disconnect" title="Disconnect (session kept alive)">Disconnect</button>
      <button id="btn-kill" class="danger" title="Terminate the persistent session">Kill</button>
      <button id="btn-logout" title="Log out (forget the saved token)">Logout</button>
    </div>
  </div>

  <div id="terminal"></div>

  <!-- Helper key row, shown on touch devices -->
  <div id="keybar"></div>

  <!-- Login overlay -->
  <div id="login" class="hidden">
    <form id="login-form">
      <h2>Remote Shell</h2>
      <p id="login-error" class="error hidden"></p>
      <input id="login-user" type="text" placeholder="Username" autocomplete="username" autocapitalize="off" autocorrect="off" />
      <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" />
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/addon-fit/addon-fit.js"></script>
  <script src="/vendor/addon-web-links/addon-web-links.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
