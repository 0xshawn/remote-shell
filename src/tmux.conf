# remote-shell tmux configuration.
# This is applied transparently with `tmux -f`; users never run tmux commands.

set -g status off                  # hide the tmux status bar (looks like a plain shell)
set -g mouse on                    # wheel scrolls tmux history; the web UI injects wheel events on touch-drag
set -g history-limit 100000        # large scrollback buffer
set -g base-index 0
set -g escape-time 0               # snappy ESC handling (good for vim)
set -g focus-events on
setw -g aggressive-resize on       # resize the window to the active client, not the smallest one
set -g default-terminal "screen-256color"

# The key persistence settings: keep the session alive after the browser detaches.
set -g destroy-unattached off
set -g remain-on-exit off

set -g set-clipboard on
