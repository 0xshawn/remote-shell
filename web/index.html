<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1115" />
  <title>Remote Shell</title>
  <link rel="stylesheet" href="/vendor/xterm/xterm.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="toolbar">
    <span id="status" class="status-dot status-off" title="offline"></span>
    <div id="tab-strip">
      <div id="tabs"></div>
      <button id="tab-add" title="New terminal" aria-label="New terminal">&plus;</button>
    </div>
    <button id="kb-fab" title="Toggle keys" aria-label="Toggle keys">⌨️</button>
    <div id="font-ctl">
      <button id="btn-font-dec" title="Smaller font" aria-label="Smaller font"><span class="font-a">A</span>&minus;</button>
      <button id="btn-font-inc" title="Larger font" aria-label="Larger font"><span class="font-a">A</span>&plus;</button>
    </div>
    <button id="btn-paste" title="Paste from clipboard">Paste</button>
    <div id="menu-wrap">
      <button id="btn-menu" title="More actions" aria-haspopup="true">&#8943;</button>
      <div id="menu" class="hidden" role="menu">
        <button data-act="copy">Copy selection</button>
        <button data-act="clear">Clear screen</button>
        <button data-act="theme">Toggle theme</button>
        <button data-act="reconnect">Reconnect</button>
        <button data-act="disconnect">Disconnect</button>
        <button data-act="kill" class="danger">Kill terminal</button>
        <button data-act="change-password">Change password</button>
        <button data-act="users" id="menu-users" class="hidden">Manage users</button>
        <button data-act="logout">Logout</button>
      </div>
    </div>
  </div>

  <div id="terminals"></div>

  <!-- Helper keys for touch devices. Hidden by default; the toolbar button
       (#kb-fab) toggles the whole panel. All keys live in one wrapping row. -->
  <div id="keybar" class="hidden">
    <div id="keybar-keys"></div>
  </div>

  <!-- Paste fallback overlay (used when navigator.clipboard is unavailable,
       e.g. over plain HTTP). -->
  <div id="paste-overlay" class="hidden">
    <div id="paste-box">
      <h3>Paste</h3>
      <p class="hint">Long-press / Ctrl-V into the box, then Send.</p>
      <textarea id="paste-text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
      <div class="paste-actions">
        <button id="paste-cancel">Cancel</button>
        <button id="paste-send" class="primary">Send</button>
      </div>
    </div>
  </div>

  <!-- Login overlay -->
  <div id="login" class="hidden">
    <form id="login-form">
      <h2>Remote Shell</h2>
      <p id="login-error" class="error hidden"></p>
      <input id="login-user" name="username" type="text" placeholder="Username" autocomplete="username" autocapitalize="off" autocorrect="off" />
      <input id="login-pass" name="password" type="password" placeholder="Password" autocomplete="current-password" />
      <label id="login-remember-row"><input id="login-remember" type="checkbox" checked /> Remember me</label>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <!-- Change-password overlay -->
  <div id="chpw-overlay" class="hidden">
    <form id="chpw-form">
      <h3>Change password</h3>
      <p id="chpw-msg" class="hint hidden"></p>
      <input id="chpw-old" type="password" placeholder="Current password" autocomplete="current-password" />
      <input id="chpw-new" type="password" placeholder="New password (min 6)" autocomplete="new-password" />
      <input id="chpw-confirm" type="password" placeholder="Confirm new password" autocomplete="new-password" />
      <div class="chpw-actions">
        <button type="button" id="chpw-cancel">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  </div>

  <!-- Manage users overlay (admin only) -->
  <div id="users-overlay" class="hidden">
    <div id="users-box">
      <h3>Manage users</h3>
      <p id="users-msg" class="hint hidden"></p>
      <ul id="users-list"></ul>
      <form id="users-create">
        <input id="nu-name" type="text" placeholder="New username" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <input id="nu-pass" type="password" placeholder="Password (min 6)" autocomplete="new-password" />
        <label class="nu-admin"><input id="nu-admin" type="checkbox" /> Admin</label>
        <button type="submit" class="primary">Create</button>
      </form>
      <div class="users-actions"><button type="button" id="users-close">Close</button></div>
    </div>
  </div>

  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/addon-fit/addon-fit.js"></script>
  <script src="/vendor/addon-webgl/addon-webgl.js"></script>
  <script src="/js/scroll-routing.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
